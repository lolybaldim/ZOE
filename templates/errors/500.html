<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error — ZOE Health</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#0ea5e9',secondary:'#10b981'}}}}</script>
  <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}</style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="text-center max-w-md">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-10">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
        <span class="text-white font-bold text-sm">Z</span>
      </div>
      <span class="font-bold text-slate-900 text-lg">ZOE Health</span>
    </div>

    <!-- Illustration -->
    <div class="w-24 h-24 bg-amber-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-12 h-12 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>

    <p class="text-7xl font-black text-amber-500 mb-2">500</p>
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Something went wrong</h1>
    <p class="text-slate-500 text-sm mb-8">
      The server encountered an unexpected error. Our team has been notified.<br/>
      Please try again in a moment.
    </p>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="{{ url_for('dashboard.home') }}"
         class="inline-flex items-center justify-center gap-2 bg-primary text-white px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-sky-600 transition shadow-lg shadow-primary/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Go to Dashboard
      </a>
      <button onclick="location.reload()"
              class="inline-flex items-center justify-center gap-2 border border-slate-200 text-slate-600 px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-slate-100 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Try Again
      </button>
    </div>

  </div>
</body>
</html>
